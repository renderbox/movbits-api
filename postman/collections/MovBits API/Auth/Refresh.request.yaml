$kind: http-request
url: "{{base_url}}/api/auth/token/refresh"
method: POST
body:
  type: json
  content: |-
    {
      "refresh": "{{refresh_token}}"
    }
scripts:
  - type: afterResponse
    code: |-
      let jsonData = pm.response.json();
      pm.environment.set("access_token", jsonData.access);
    language: text/javascript
order: 2000
